<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reel Carousel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* ==========================================
       🎨 CORE STYLES & LAYOUT
       ========================================== */
    :root {
      --item-width: 320px;
      --item-gap: 20px;
      --bg-color: #ffffff;
      --text-color: #050505;
      --card-bg: #f5f5f5;
      --accent-color: rgba(0, 0, 0, 0.05);
      --border-color: rgba(0, 0, 0, 0.1);
      --overlay-gradient: linear-gradient(to top, rgba(255,255,255,0.6), transparent);
    }

    [data-theme="dark"] {
      --bg-color: #050505;
      --text-color: #ffffff;
      --card-bg: #111;
      --accent-color: rgba(255, 255, 255, 0.05);
      --border-color: rgba(255, 255, 255, 0.1);
      --overlay-gradient: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
    }

    /* Responsive dimensions */
    @media (max-width: 768px) {
      :root {
        --item-width: 260px;
        --item-gap: 15px;
      }
    }
    @media (max-width: 480px) {
      :root {
        --item-width: 75vw;
        --item-gap: 12px;
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      overflow-x: hidden;
      transition: background-color 0.4s ease, color 0.4s ease;
    }

    /* ==========================================
       🌅 HERO SECTION
       ========================================== */
    .hero-section {
      width: 100vw;
      height: 100vh;
      min-height: 600px;
      display: flex;
      flex-direction: column;
      position: relative;
      padding: 0 5vw;
    }

    .hero-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 30px 0;
      z-index: 10;
    }

    .logo h1 {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 2px;
      letter-spacing: -0.02em;
    }

    .logo p {
      font-size: 0.9rem;
      color: var(--text-color);
      opacity: 0.6;
    }

    .nav-links {
      display: flex;
      gap: 40px;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text-color);
      font-size: 1rem;
      font-weight: 500;
      transition: opacity 0.3s;
    }

    .nav-links a:hover {
      opacity: 0.7;
    }

    .btn {
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 30px;
      font-size: 0.95rem;
      font-weight: 500;
      display: inline-block;
      transition: transform 0.3s, background 0.3s;
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background: var(--text-color);
      color: var(--bg-color);
    }

    .btn-primary:hover {
      transform: scale(1.05);
    }

    .hero-content {
      flex: 1;
      display: flex;
      align-items: center;
      position: relative;
      z-index: 5;
    }

    .hero-left {
      flex: 1;
      padding-right: 20px;
      z-index: 10;
      transform: translateY(-8vh);
    }

    .hero-left h2 {
      font-size: 3.5rem;
      font-weight: 600;
      line-height: 1.1;
      letter-spacing: -0.03em;
      perspective: 1000px;
    }

    .flip-word {
      display: inline-block;
      opacity: 0;
      transform-origin: top center;
      animation: flipInX 0.9s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes flipInX {
      0% {
        transform: perspective(600px) rotateX(-90deg);
        opacity: 0;
      }
      100% {
        transform: perspective(600px) rotateX(0deg);
        opacity: 1;
      }
    }

    .hero-center {
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 100%;
      max-width: 1000px;
      height: 115%;
      z-index: 1;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      pointer-events: none;
    }

    .hero-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: bottom center;
      transform: scale(1.50);
      transform-origin: bottom center;
    }



    .hero-right {
      flex: 1;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding-left: 20px;
      z-index: 10;
      transform: translateY(5vh);
    }

    .floating-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.05);
      display: inline-flex;
      flex-direction: column;
      gap: 16px;
      backdrop-filter: blur(10px);
    }

    [data-theme="dark"] .floating-card {
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }

    .trusted-by {
      display: flex;
      align-items: center;
      font-size: 0.95rem;
      color: var(--text-color);
      opacity: 0.9;
    }

    .strong-text {
      font-weight: 600;
      margin-left: 4px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #2ecc71;
      border-radius: 50%;
      margin-right: 12px;
      box-shadow: 0 0 10px rgba(46, 204, 113, 0.4);
    }

    .btn-dark {
      background: #111;
      color: #fff;
      border-radius: 8px;
      text-align: center;
      width: 100%;
      font-weight: 600;
      padding: 14px 24px;
    }

    [data-theme="dark"] .btn-dark {
      background: #fff;
      color: #111;
    }

    @media (max-width: 1024px) {
      .hero-left h2 { font-size: 3.5rem; }
      .hero-center { width: 50%; }
      .nav-links { gap: 20px; }
    }

    @media (max-width: 768px) {
      .hero-nav { flex-wrap: wrap; gap: 20px; }
      .nav-links { display: none; }
      .hero-content { flex-direction: column; align-items: flex-start; justify-content: center; gap: 40px; }
      .hero-left h2 { font-size: 2.5rem; margin-bottom: 250px; }
      .hero-center { width: 70%; height: 50%; bottom: auto; top: 30%; }
      .hero-right { width: 100%; justify-content: flex-start; margin-bottom: 40px; }
    }

    /* ==========================================
       🎬 CAROUSEL SECTION
       ========================================== */
    .carousel-section {
      width: 100vw;
      padding: 60px 0 120px;
      position: relative;
    }

    .carousel-container {
      width: 100%;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
    }

    /* Gradient edges to give cinematic fade effect */
    .carousel-container::before,
    .carousel-container::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      width: 8%;
      z-index: 20;
      pointer-events: none;
    }
    .carousel-container::before {
      left: 0;
      background: linear-gradient(to right, var(--bg-color) 0%, transparent 100%);
    }
    .carousel-container::after {
      right: 0;
      background: linear-gradient(to left, var(--bg-color) 0%, transparent 100%);
    }

    .carousel-track {
      display: flex;
      gap: var(--item-gap);
      align-items: center;
      transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
      will-change: transform;
      cursor: grab;
      /* Padding prevents vertical cropping of shadows during animations */
      padding: 50px 0;
    }
    .carousel-track:active {
      cursor: grabbing;
    }

    /* ==========================================
       🎬 CAROUSEL ITEM (THE CARDS)
       ========================================== */
    .carousel-item {
      width: var(--item-width);
      height: calc(var(--item-width) * 16 / 9);
      flex-shrink: 0;
      position: relative;
      cursor: pointer;
    }

    /* The inner bounds handle the scale down so gap layout doesn't break */
    .carousel-item-inner {
      width: 100%;
      height: 100%;
      border-radius: 24px;
      overflow: hidden;
      transform: scale(0.85); /* Scales down inactive items */
      transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), 
                  opacity 0.6s ease, filter 0.6s ease;
      position: relative;
      background: var(--card-bg);
      opacity: 0.4;
      filter: blur(2px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      border: 1px solid var(--border-color);
      /* Pointer events restricted to outer wrapper */
      pointer-events: none; 
    }

    /* The active (center) item receives focus styles */
    .carousel-item.active .carousel-item-inner {
      transform: scale(1);
      opacity: 1;
      filter: blur(0px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    }

    .carousel-item-inner video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ==========================================
       📝 CAPTIONS & OVERLAYS
       ========================================== */
    .overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 35%;
      background: var(--overlay-gradient);
      pointer-events: none;
    }

    .caption {
      position: absolute;
      bottom: 30px;
      left: 24px;
      right: 24px;
      color: var(--text-color);
      opacity: 0;
      transform: translateY(15px);
      transition: opacity 0.4s ease 0.3s, transform 0.4s ease 0.3s;
    }

    .carousel-item.active .caption {
      opacity: 1;
      transform: translateY(0);
    }

    .caption h2 {
      margin: 0 0 6px;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .caption p {
      margin: 0;
      font-size: 0.95rem;
      color: var(--text-color);
      opacity: 0.7;
      line-height: 1.4;
    }

    /* ==========================================
       🕹️ NAVIGATION CONTROLS
       ========================================== */
    .controls {
      position: absolute;
      bottom: 5vh;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
      z-index: 100;
    }

    .controls button {
      background: var(--accent-color);
      border: 1px solid var(--border-color);
      color: var(--text-color);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      transition: background 0.3s, transform 0.2s, color 0.3s;
    }

    .controls button:hover {
      background: var(--border-color);
      transform: scale(1.05);
    }
    .controls button:active {
      transform: scale(0.95);
    }

    .controls button svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ==========================================
       🌗 THEME TOGGLE BUTTON
       ========================================== */
    .theme-toggle {
      position: fixed;
      top: 30px;
      right: 30px;
      z-index: 1000;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--accent-color);
      border: 1px solid var(--border-color);
      color: var(--text-color);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }
    .theme-toggle:hover {
      transform: scale(1.1);
      background: var(--border-color);
    }
    .theme-toggle svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
    }
    .theme-toggle .sun-icon { display: none; }
    .theme-toggle .moon-icon { display: block; }
    [data-theme="dark"] .theme-toggle .sun-icon { display: block; }
    [data-theme="dark"] .theme-toggle .moon-icon { display: none; }
  </style>
</head>
<body>

  <!-- THEME TOGGLE -->
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle Theme">
    <svg class="sun-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
    <svg class="moon-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
  </button>

  <!-- HERO SECTION -->
  <section class="hero-section">
    <nav class="hero-nav">
      <div class="logo">
        <h1>Harshit jain</h1>
        <p>Video Editor &amp; Motion Graphics Artist</p>
      </div>
      <ul class="nav-links">
        <li><a href="#">Work</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
      <div class="nav-cta">
        <a href="#" class="btn btn-primary">Contact Now</a>
      </div>
    </nav>

    <div class="hero-content">
      <div class="hero-left">
        <h2>I turn raw footage into<br>stories people can't<br>stop watching.</h2>
      </div>
      <div class="hero-center">
        <!-- REPLACE THE SRC BELOW WITH YOUR CUTOUT IMAGE URL -->
        <img src="photo.png" alt="Harshit Jain Photo" class="hero-image" />
      </div>
      <div class="hero-right">
        <div class="floating-card">
          <div class="trusted-by">
            <span class="status-dot"></span> Trusted by <span class="strong-text">Global Brands</span>
          </div>
          <button class="btn btn-dark" onclick="document.getElementById('carousel-section').scrollIntoView({behavior: 'smooth'})">View My Work</button>
        </div>
      </div>
    </div>
  </section>

  <!-- CAROUSEL SECTION WRAPPER -->
  <section class="carousel-section" id="carousel-section">
    <!-- CAROUSEL WRAPPER -->
    <div class="carousel-container">
      <div class="carousel-track" id="carouselTrack">
        <!-- Items generated dynamically by JS -->
      </div>

      <!-- CONTROLS -->
    <div class="controls">
      <button id="prevBtn" aria-label="Previous">
        <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <button id="nextBtn" aria-label="Next">
        <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>
  </div>
  </section>

  <script>
    // ==========================================
    // 🔠 HERO TEXT 3D ANIMATION
    // ==========================================
    document.addEventListener("DOMContentLoaded", () => {
      const headline = document.querySelector('.hero-left h2');
      if(headline) {
        const lines = headline.innerHTML.split('<br>');
        headline.innerHTML = '';
        let delay = 0;
        
        lines.forEach((line, lineIndex) => {
          const words = line.split(' ');
          words.forEach((word) => {
            const span = document.createElement('span');
            span.className = 'flip-word';
            span.style.animationDelay = `${delay}s`;
            span.innerHTML = word + '&nbsp;';
            headline.appendChild(span);
            // 80ms delay overlap like standard AE presets
            delay += 0.08; 
          });
          
          if (lineIndex < lines.length - 1) {
            headline.appendChild(document.createElement('br'));
          }
        });
      }
    });

    // ==========================================
    // 🎥 VIDEO CONFIGURATION 
    // Easily replace these URLs with your own.
    // Ensure videos are hosted and allow cross-origin.
    // ==========================================
    const VIDEOS = [
      {
        url: "https://github.com/user-attachments/assets/61fb8a92-2a1c-4aab-83e9-ed870fd15567",
        title: "Project Redbull",
        description: "Storyboard motion graphics"
      },
      {
        url: "https://github.com/user-attachments/assets/32180927-5217-4df3-b020-38c7e23642d2",
        title: "Starter Homes",
        description: "Mortgage home explainer"
      },
      {
        url: "https://github.com/user-attachments/assets/099bb461-3dfa-4d59-accf-5ee5fdbbc862",
        title: "Finelegends",
        description: "Beatsync Transition"
      },
      {
        url: "https://github.com/user-attachments/assets/6c75315d-3f76-479a-a529-16924eaef7d1",
        title: "Frank Automotive",
        description: "Masked Transitions"
      },
      {
        url: "https://github.com/user-attachments/assets/5ffa2f40-c311-45a7-9cc4-57e700a4780c",
        title: "Englishbhashi",
        description: "Educational Explainer"
      }
    ];

    // ==========================================
    // ⚙️ CAROUSEL ENGINE
    // ==========================================
    document.addEventListener("DOMContentLoaded", () => {
      // ==========================================
      // 🌓 THEME CHANGER LOGIC
      // ==========================================
      const themeToggle = document.getElementById('themeToggle');
      const currentTheme = localStorage.getItem('theme') || 'light';
      
      if (currentTheme === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
      }

      themeToggle.addEventListener('click', () => {
          let theme = document.documentElement.getAttribute('data-theme');
          if (theme === 'dark') {
              document.documentElement.removeAttribute('data-theme');
              localStorage.setItem('theme', 'light');
          } else {
              document.documentElement.setAttribute('data-theme', 'dark');
              localStorage.setItem('theme', 'dark');
          }
      });

      const track = document.getElementById('carouselTrack');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      
      let currentIndex = 0;
      let isDragging = false;
      let startX = 0;
      let startTransform = 0;
      let domItems = [];

      // 1. Build DOM Elements from the Array
      VIDEOS.forEach((videoData, index) => {
        const item = document.createElement('div');
        item.className = 'carousel-item';
        
        // Handle click event (trigger only real clicks, ignore drags)
        item.addEventListener('click', () => {
          if (!document.body.classList.contains('is-dragging')) {
            goToIndex(index);
          }
        });
        
        item.innerHTML = `
          <div class="carousel-item-inner">
            <video src="${videoData.url}" loop muted playsinline></video>
            <div class="overlay"></div>
            <div class="caption">
              <h2>${videoData.title}</h2>
              <p>${videoData.description}</p>
            </div>
          </div>
        `;
        track.appendChild(item);
      });
      
      domItems = document.querySelectorAll('.carousel-item');
      
      // 2. Navigation Control Function
      function goToIndex(index) {
        if (index < 0) index = 0;
        if (index >= domItems.length) index = domItems.length - 1;
        currentIndex = index;
        updateCarousel();
      }
      
      // 3. Update Visual State and Handle Autoplay
      function updateCarousel() {
        const containerWidth = document.querySelector('.carousel-container').offsetWidth;
        const itemWidth = domItems[0].offsetWidth;
        const gap = parseFloat(getComputedStyle(track).gap) || 0;
        
        // Calculate offset to perfectly center the active card
        const offset = (containerWidth / 2) - (itemWidth / 2) - (currentIndex * (itemWidth + gap));
        track.style.transform = `translateX(${offset}px)`;
        
        // Update item classes and video playback
        domItems.forEach((item, i) => {
          const isActive = i === currentIndex;
          item.classList.toggle('active', isActive);
          
          const video = item.querySelector('video');
          if (isActive) {
            video.currentTime = 0; // Cinematic fresh start on center
            video.play().catch(err => console.warn("Autoplay blocked by browser:", err));
          } else {
            video.pause();
          }
        });

        // Update Arrow Button opacities based on boundaries
        prevBtn.style.opacity = currentIndex === 0 ? "0.3" : "1";
        prevBtn.style.cursor = currentIndex === 0 ? "not-allowed" : "pointer";
        nextBtn.style.opacity = currentIndex === domItems.length - 1 ? "0.3" : "1";
        nextBtn.style.cursor = currentIndex === domItems.length - 1 ? "not-allowed" : "pointer";
      }

      // 4. Implement Drag / Swipe Functionality
      track.addEventListener('mousedown', dragStart);
      track.addEventListener('touchstart', dragStart, {passive: true});
      
      window.addEventListener('mousemove', dragMove);
      window.addEventListener('touchmove', dragMove, {passive: true});
      
      window.addEventListener('mouseup', dragEnd);
      window.addEventListener('touchend', dragEnd);

      let dragThreshold = 50; 
      let currentX = 0;
      let isActualDrag = false;

      function dragStart(e) {
        if (e.target.closest('.controls')) return;
        
        startX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
        isDragging = true;
        isActualDrag = false;
        
        // Find current translation matrix to add smooth drag to it
        const style = window.getComputedStyle(track);
        const matrix = new DOMMatrix(style.transform);
        startTransform = matrix.m41;
        
        track.style.transition = 'none'; // Disable transition for 1-to-1 sync during drag
      }

      function dragMove(e) {
        if (!isDragging) return;
        currentX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
        const diffX = currentX - startX;
        
        if (Math.abs(diffX) > 10) {
          isActualDrag = true;
          document.body.classList.add('is-dragging'); // Block click events momentarily
        }
        
        track.style.transform = `translateX(${startTransform + diffX}px)`;
      }

      function dragEnd(e) {
        if (!isDragging) return;
        isDragging = false;
        track.style.transition = 'transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1)';
        
        setTimeout(() => document.body.classList.remove('is-dragging'), 50);

        if (!isActualDrag) return; 
        
        currentX = e.type === 'touchend' ? e.changedTouches[0].clientX : e.clientX;
        const diffX = currentX - startX;
        
        // Evaluate swipe direction & threshold
        if (diffX < -dragThreshold && currentIndex < domItems.length - 1) {
          goToIndex(currentIndex + 1);
        } else if (diffX > dragThreshold && currentIndex > 0) {
          goToIndex(currentIndex - 1);
        } else {
          goToIndex(currentIndex); // Snap back to center if threshold wasn't met
        }
      }

      // 5. Setup Listeners
      window.addEventListener('resize', () => {
        track.style.transition = 'none';
        updateCarousel();
        setTimeout(() => {
          track.style.transition = 'transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1)';
        }, 50);
      });
      
      prevBtn.addEventListener('click', () => goToIndex(currentIndex - 1));
      nextBtn.addEventListener('click', () => goToIndex(currentIndex + 1));
      
      // Initial Layout calculation
      setTimeout(updateCarousel, 50);
    });
  </script>
</body>
</html>
