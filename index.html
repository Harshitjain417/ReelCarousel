<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reel Carousel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* ==========================================
       🎨 CORE STYLES & LAYOUT
       ========================================== */
    :root {
      --item-width: 320px;
      --item-gap: 20px;
      --bg-color: #050505;
    }

    /* Responsive dimensions */
    @media (max-width: 768px) {
      :root {
        --item-width: 260px;
        --item-gap: 15px;
      }
    }
    @media (max-width: 480px) {
      :root {
        --item-width: 75vw;
        --item-gap: 12px;
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: white;
      overflow-x: hidden;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .carousel-container {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
    }

    /* Gradient edges to give cinematic fade effect */
    .carousel-container::before,
    .carousel-container::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      width: 15%;
      z-index: 20;
      pointer-events: none;
    }
    .carousel-container::before {
      left: 0;
      background: linear-gradient(to right, var(--bg-color) 0%, transparent 100%);
    }
    .carousel-container::after {
      right: 0;
      background: linear-gradient(to left, var(--bg-color) 0%, transparent 100%);
    }

    .carousel-track {
      display: flex;
      gap: var(--item-gap);
      align-items: center;
      transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
      will-change: transform;
      cursor: grab;
      /* Padding prevents vertical cropping of shadows during animations */
      padding: 50px 0;
    }
    .carousel-track:active {
      cursor: grabbing;
    }

    /* ==========================================
       🎬 CAROUSEL ITEM (THE CARDS)
       ========================================== */
    .carousel-item {
      width: var(--item-width);
      height: calc(var(--item-width) * 16 / 9);
      flex-shrink: 0;
      position: relative;
      cursor: pointer;
    }

    /* The inner bounds handle the scale down so gap layout doesn't break */
    .carousel-item-inner {
      width: 100%;
      height: 100%;
      border-radius: 24px;
      overflow: hidden;
      transform: scale(0.85); /* Scales down inactive items */
      transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), 
                  opacity 0.6s ease, filter 0.6s ease;
      position: relative;
      background: #111;
      opacity: 0.4;
      filter: blur(2px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      /* Pointer events restricted to outer wrapper */
      pointer-events: none; 
    }

    /* The active (center) item receives focus styles */
    .carousel-item.active .carousel-item-inner {
      transform: scale(1);
      opacity: 1;
      filter: blur(0px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    }

    .carousel-item-inner video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ==========================================
       📝 CAPTIONS & OVERLAYS
       ========================================== */
    .overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60%;
      background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
      pointer-events: none;
    }

    .caption {
      position: absolute;
      bottom: 30px;
      left: 24px;
      right: 24px;
      color: white;
      opacity: 0;
      transform: translateY(15px);
      transition: opacity 0.4s ease 0.3s, transform 0.4s ease 0.3s;
    }

    .carousel-item.active .caption {
      opacity: 1;
      transform: translateY(0);
    }

    .caption h2 {
      margin: 0 0 6px;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .caption p {
      margin: 0;
      font-size: 0.95rem;
      color: rgba(255,255,255,0.7);
      line-height: 1.4;
    }

    /* ==========================================
       🕹️ NAVIGATION CONTROLS
       ========================================== */
    .controls {
      position: absolute;
      bottom: 5vh;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
      z-index: 100;
    }

    .controls button {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      transition: background 0.3s, transform 0.2s;
    }

    .controls button:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: scale(1.05);
    }
    .controls button:active {
      transform: scale(0.95);
    }

    .controls button svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>
</head>
<body>

  <!-- CAROUSEL WRAPPER -->
  <div class="carousel-container">
    <div class="carousel-track" id="carouselTrack">
      <!-- Items generated dynamically by JS -->
    </div>

    <!-- CONTROLS -->
    <div class="controls">
      <button id="prevBtn" aria-label="Previous">
        <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <button id="nextBtn" aria-label="Next">
        <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>
  </div>

  <script>
    // ==========================================
    // 🎥 VIDEO CONFIGURATION 
    // Easily replace these URLs with your own.
    // Ensure videos are hosted and allow cross-origin.
    // ==========================================
    const VIDEOS = [
      {
        url: "https://github.com/user-attachments/assets/61fb8a92-2a1c-4aab-83e9-ed870fd15567",
        title: "Project Redbull",
        description: "Storyboard motion graphics"
      },
      {
        url: "https://github.com/user-attachments/assets/32180927-5217-4df3-b020-38c7e23642d2",
        title: "Starter Homes",
        description: "Mortgage home explainer"
      },
      {
        url: "https://github.com/user-attachments/assets/099bb461-3dfa-4d59-accf-5ee5fdbbc862",
        title: "Finelegends",
        description: "Beatsync Transition"
      },
      {
        url: "https://github.com/user-attachments/assets/6c75315d-3f76-479a-a529-16924eaef7d1",
        title: "Frank Automotive",
        description: "Masked Transitions"
      },
      {
        url: "https://github.com/user-attachments/assets/5ffa2f40-c311-45a7-9cc4-57e700a4780c",
        title: "Englishbhashi",
        description: "Educational Explainer"
      }
    ];

    // ==========================================
    // ⚙️ CAROUSEL ENGINE
    // ==========================================
    document.addEventListener("DOMContentLoaded", () => {
      const track = document.getElementById('carouselTrack');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      
      let currentIndex = 0;
      let isDragging = false;
      let startX = 0;
      let startTransform = 0;
      let domItems = [];

      // 1. Build DOM Elements from the Array
      VIDEOS.forEach((videoData, index) => {
        const item = document.createElement('div');
        item.className = 'carousel-item';
        
        // Handle click event (trigger only real clicks, ignore drags)
        item.addEventListener('click', () => {
          if (!document.body.classList.contains('is-dragging')) {
            goToIndex(index);
          }
        });
        
        item.innerHTML = `
          <div class="carousel-item-inner">
            <video src="${videoData.url}" loop muted playsinline></video>
            <div class="overlay"></div>
            <div class="caption">
              <h2>${videoData.title}</h2>
              <p>${videoData.description}</p>
            </div>
          </div>
        `;
        track.appendChild(item);
      });
      
      domItems = document.querySelectorAll('.carousel-item');
      
      // 2. Navigation Control Function
      function goToIndex(index) {
        if (index < 0) index = 0;
        if (index >= domItems.length) index = domItems.length - 1;
        currentIndex = index;
        updateCarousel();
      }
      
      // 3. Update Visual State and Handle Autoplay
      function updateCarousel() {
        const containerWidth = document.querySelector('.carousel-container').offsetWidth;
        const itemWidth = domItems[0].offsetWidth;
        const gap = parseFloat(getComputedStyle(track).gap) || 0;
        
        // Calculate offset to perfectly center the active card
        const offset = (containerWidth / 2) - (itemWidth / 2) - (currentIndex * (itemWidth + gap));
        track.style.transform = `translateX(${offset}px)`;
        
        // Update item classes and video playback
        domItems.forEach((item, i) => {
          const isActive = i === currentIndex;
          item.classList.toggle('active', isActive);
          
          const video = item.querySelector('video');
          if (isActive) {
            video.currentTime = 0; // Cinematic fresh start on center
            video.play().catch(err => console.warn("Autoplay blocked by browser:", err));
          } else {
            video.pause();
          }
        });

        // Update Arrow Button opacities based on boundaries
        prevBtn.style.opacity = currentIndex === 0 ? "0.3" : "1";
        prevBtn.style.cursor = currentIndex === 0 ? "not-allowed" : "pointer";
        nextBtn.style.opacity = currentIndex === domItems.length - 1 ? "0.3" : "1";
        nextBtn.style.cursor = currentIndex === domItems.length - 1 ? "not-allowed" : "pointer";
      }

      // 4. Implement Drag / Swipe Functionality
      track.addEventListener('mousedown', dragStart);
      track.addEventListener('touchstart', dragStart, {passive: true});
      
      window.addEventListener('mousemove', dragMove);
      window.addEventListener('touchmove', dragMove, {passive: true});
      
      window.addEventListener('mouseup', dragEnd);
      window.addEventListener('touchend', dragEnd);

      let dragThreshold = 50; 
      let currentX = 0;
      let isActualDrag = false;

      function dragStart(e) {
        if (e.target.closest('.controls')) return;
        
        startX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
        isDragging = true;
        isActualDrag = false;
        
        // Find current translation matrix to add smooth drag to it
        const style = window.getComputedStyle(track);
        const matrix = new DOMMatrix(style.transform);
        startTransform = matrix.m41;
        
        track.style.transition = 'none'; // Disable transition for 1-to-1 sync during drag
      }

      function dragMove(e) {
        if (!isDragging) return;
        currentX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
        const diffX = currentX - startX;
        
        if (Math.abs(diffX) > 10) {
          isActualDrag = true;
          document.body.classList.add('is-dragging'); // Block click events momentarily
        }
        
        track.style.transform = `translateX(${startTransform + diffX}px)`;
      }

      function dragEnd(e) {
        if (!isDragging) return;
        isDragging = false;
        track.style.transition = 'transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1)';
        
        setTimeout(() => document.body.classList.remove('is-dragging'), 50);

        if (!isActualDrag) return; 
        
        currentX = e.type === 'touchend' ? e.changedTouches[0].clientX : e.clientX;
        const diffX = currentX - startX;
        
        // Evaluate swipe direction & threshold
        if (diffX < -dragThreshold && currentIndex < domItems.length - 1) {
          goToIndex(currentIndex + 1);
        } else if (diffX > dragThreshold && currentIndex > 0) {
          goToIndex(currentIndex - 1);
        } else {
          goToIndex(currentIndex); // Snap back to center if threshold wasn't met
        }
      }

      // 5. Setup Listeners
      window.addEventListener('resize', () => {
        track.style.transition = 'none';
        updateCarousel();
        setTimeout(() => {
          track.style.transition = 'transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1)';
        }, 50);
      });
      
      prevBtn.addEventListener('click', () => goToIndex(currentIndex - 1));
      nextBtn.addEventListener('click', () => goToIndex(currentIndex + 1));
      
      // Initial Layout calculation
      setTimeout(updateCarousel, 50);
    });
  </script>
</body>
</html>
